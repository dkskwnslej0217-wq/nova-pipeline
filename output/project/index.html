<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:#000008;font-family:'Orbitron',sans-serif;color:#fff;overflow-x:hidden;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:relative;z-index:10;max-width:720px;margin:0 auto;padding:1.6rem 1.2rem 4rem;}

/* 헤더 */
#top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.4rem;padding-bottom:1rem;border-bottom:1px solid rgba(139,92,246,.12);}
#top-left{display:flex;align-items:center;gap:.7rem;}
#top-orb{width:28px;height:28px;border-radius:50%;box-shadow:0 0 14px rgba(139,92,246,.6);}
#top-name{font-size:.9rem;font-weight:900;letter-spacing:.2em;color:#fff;text-shadow:0 0 12px #7c3aed;}
#top-right{display:flex;gap:.6rem;align-items:center;}
.nav-link{font-size:.72rem;letter-spacing:.12em;color:rgba(167,139,250,.8);text-decoration:none;
  border:1px solid rgba(139,92,246,.3);border-radius:6px;padding:.28rem .65rem;transition:.2s;}
.nav-link:hover{color:#c4b5fd;border-color:#8b5cf6;}

/* 섹션 타이틀 */
.sec-title{font-size:.72rem;letter-spacing:.25em;color:rgba(196,181,253,.85);margin-bottom:1rem;
  text-transform:uppercase;display:flex;align-items:center;gap:.5rem;}
.sec-title::after{content:'';flex:1;height:1px;background:rgba(139,92,246,.1);}

/* 프로젝트 카드 */
#projects-section{margin-bottom:2.4rem;}
.project-card{
  background:rgba(10,4,30,.7);border:1px solid rgba(139,92,246,.18);
  border-radius:14px;padding:1.3rem 1.4rem;margin-bottom:.8rem;
  transition:border-color .2s,box-shadow .2s;cursor:pointer;
}
.project-card:hover{border-color:rgba(139,92,246,.4);box-shadow:0 0 20px rgba(109,40,217,.15);}
.project-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.6rem;}
.project-title{font-size:.68rem;font-weight:700;letter-spacing:.12em;color:#fff;line-height:1.4;}
.project-tag{font-size:.65rem;letter-spacing:.12em;padding:.22rem .6rem;border-radius:20px;
  background:rgba(109,40,217,.2);border:1px solid rgba(139,92,246,.3);color:#c4b5fd;white-space:nowrap;margin-left:.5rem;flex-shrink:0;}
.project-desc{font-size:.78rem;letter-spacing:.04em;color:rgba(196,181,253,.75);line-height:1.9;margin-bottom:.8rem;}
.project-notes-area{
  width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(139,92,246,.2);

}
.project-notes-area:focus{border-color:rgba(139,92,246,.5);}
.project-notes-area::placeholder{color:rgba(255,255,255,.3);}
.save-note-btn{
  margin-top:.5rem;font-size:.7rem;letter-spacing:.1em;
  background:rgba(109,40,217,.25);border:1px solid rgba(139,92,246,.3);
  border-radius:6px;color:#c4b5fd;font-family:'Orbitron',sans-serif;
  padding:.3rem .8rem;cursor:pointer;transition:.2s;
}
.save-note-btn:hover{background:rgba(109,40,217,.4);}

/* 성과 기록 버튼 */
.stat-btn{
  margin-top:.5rem;margin-left:.5rem;font-size:.7rem;letter-spacing:.1em;
  background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);

  padding:.3rem .8rem;cursor:pointer;transition:.2s;
}
.stat-btn:hover{background:rgba(52,211,153,.22);}

/* 성과 미니 뱃지 */
.stat-mini{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap;}
.stat-chip{font-size:.65rem;letter-spacing:.06em;color:rgba(52,211,153,.75);
  background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);
  border-radius:4px;padding:.18rem .5rem;}

/* 성과 모달 */
#stat-modal{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,8,.88);backdrop-filter:blur(10px);

#stat-modal.open{display:flex;}
#stat-box{width:min(92vw,420px);background:rgba(6,1,22,.98);
  border:1px solid rgba(52,211,153,.25);border-radius:20px;padding:2rem 1.8rem 1.6rem;}
#stat-box h2{font-size:1.1rem;font-weight:900;letter-spacing:.2em;color:#fff;margin-bottom:.3rem;}
#stat-box p{font-size:.78rem;letter-spacing:.08em;color:rgba(52,211,153,.7);margin-bottom:1.2rem;}
.stat-field{margin-bottom:.8rem;}
.stat-field label{display:block;font-size:.72rem;letter-spacing:.12em;color:rgba(196,181,253,.85);margin-bottom:.3rem;}
.stat-field input,.stat-field select{

  border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;

}
.stat-field input::placeholder{color:rgba(255,255,255,.35);}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
#stat-submit{

#stat-submit:hover{opacity:.85;}
#stat-cancel{width:100%;background:none;border:none;color:rgba(139,92,246,.55);

#stat-cancel:hover{color:rgba(167,139,250,.8);}

/* 새 프로젝트 */
#new-project-btn{

  border-radius:14px;padding:1rem;cursor:pointer;
  color:rgba(167,139,250,.7);font-family:'Orbitron',sans-serif;

}

/* 새 프로젝트 모달 */
#new-modal{display:none;position:fixed;inset:0;z-index:200;

#star-toast-text{font-size:.82rem;letter-spacing:.1em;color:#c4b5fd;}
#star-toast-sub{font-size:.72rem;letter-spacing:.08em;color:rgba(251,191,36,.85);margin-top:.3rem;}

/* ─── 바텀 네비 ──────────────────────────────────────── */
#bottom-nav{

<script>
// ─── 배경 별 ─────────────────────────────────────────
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:500},()=>({x:Math.random(),y:Math.random(),r:Math.random()*.7,a:Math.random()*.5}));
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=.0015*(Math.random()>.5?1:-1);s.a=Math.max(.05,Math.min(.5,s.a));
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,160,255,${s.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

// ─── 유저 ────────────────────────────────────────────
const me = (() => { try { return JSON.parse(localStorage.getItem('nova_user')); } catch { return null; } })();
if (!me) { location.href = '/login.html'; }
const authHeader = () => ({ 'x-session-token': localStorage.getItem('nova_token') || '' });
async function authFetch(url, options = {}) {
  const res = await fetch(url, { ...options, headers: { ...options.headers, ...authHeader() } });
  if (res.status === 401) {
    localStorage.removeItem('nova_user');
    localStorage.removeItem('nova_token');
    location.href = '/login.html';
    return null;
  }
  return res;
}

const orb = document.getElementById('top-orb');
orb.style.background = `radial-gradient(circle at 35% 35%, ${me.star_color}cc, ${me.star_color}, #1e1b4b)`;
orb.style.boxShadow = `0 0 14px ${me.star_color}88`;

// ─── 토스트 ──────────────────────────────────────────
function showToast(title, sub) {
  const t = document.getElementById('star-toast');
  document.getElementById('star-toast-text').textContent = title;
  document.getElementById('star-toast-sub').textContent = sub;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ─── 퀘스트 렌더 ─────────────────────────────────────
async function loadQuests() {
  try {
    const res = await fetch('/api/quest?user_id=' + encodeURIComponent(me.user_id));
    const data = await res.json();
    renderQuests(data.quests);
    if (data.new_completions?.length) {
      showToast('퀘스트 완료! ✦', '별이 성장했습니다');
    }
  } catch {}
}

function renderQuests(quests) {
  const grid = document.getElementById('quest-grid');
  grid.innerHTML = '';
  quests.forEach(q => {
    const div = document.createElement('div');
    const isClickable = !q.completed && q.type === 'manual';
    div.className = 'quest-card' + (q.completed ? ' done' : (isClickable ? ' active' : ''));
    let progressHtml = '';
    if (!q.completed && q.target && q.target > 1) {
      const pct = Math.min(100, Math.round((q.progress / q.target) * 100));
      progressHtml = `<div class="quest-progress"><div class="quest-progress-bar" style="width:${pct}%"></div></div>
        <div style="font-size:.28rem;letter-spacing:.08em;color:rgba(167,139,250,.3);margin-top:.3rem">${q.progress}/${q.target}</div>`;
    }
    div.innerHTML = `
      <div class="quest-icon">${q.icon}</div>
      <div class="quest-title">${q.title}</div>
      <div class="quest-desc">${q.desc}</div>
      <div class="quest-reward">✦ +${q.reward.toFixed(2)} 별 성장</div>
      ${progressHtml}
    `;
    if (isClickable) div.onclick = () => completeManualQuest(q.id, q.title, q.reward);
    grid.appendChild(div);
  });
}

async function completeManualQuest(quest_id, title, reward) {
  try {
    const res = await authFetch('/api/quest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: me.user_id, quest_id })
    });
    if (!res) return;
    const data = await res.json();
    if (data.ok) {
      showToast(`"${title}" 완료! ✦`, `별이 +${reward.toFixed(2)} 성장했습니다`);
      loadQuests();
    }
  } catch {}
}

// ─── 프로젝트 렌더 ───────────────────────────────────
async function loadProjects() {
  try {
    const res = await fetch('/api/project?user_id=' + encodeURIComponent(me.user_id));
    const projects = await res.json();
    renderProjects(projects);
    if (projects.length > 0) renderCluster(projects[0].primary_tag);
  } catch {}
}

function renderProjects(projects) {
  const list = document.getElementById('projects-list');
  list.innerHTML = '';
  if (!projects.length) return;
  const TAG_LABELS = {
    content:'콘텐츠/크리에이터', ecommerce:'쇼핑/커머스', data:'데이터/분석',
    customer:'고객/서비스', productivity:'생산성/업무', research:'학습/리서치',
    marketing:'마케팅', other:'기타'
  };
  projects.forEach(p => {
    const div = document.createElement('div');
    div.className = 'project-card';
    div.innerHTML = `
      <div class="project-card-top">
        <div class="project-title">${p.title}</div>
        <span class="project-tag">${TAG_LABELS[p.primary_tag] || p.primary_tag}</span>
      </div>
      <div class="project-desc">${p.description || ''}</div>
      <textarea class="project-notes-area" placeholder="진행 상황, 아이디어, 메모..." data-id="${p.id}">${p.notes || ''}</textarea>
      <div style="display:flex;align-items:center;flex-wrap:wrap;">
        <button class="save-note-btn" data-id="${p.id}">노트 저장</button>
        <button class="stat-btn" data-id="${p.id}">📊 성과 기록</button>
      </div>
      <div class="stat-mini" id="stat-mini-${p.id}"></div>
    `;
    loadStatMini(p.id);
    div.querySelector('.stat-btn').onclick = () => openStatModal(p.id, p.title);
    div.querySelector('.save-note-btn').onclick = async function() {
      const notes = div.querySelector('.project-notes-area').value;
      const res = await fetch('/api/project?id=' + p.id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', ...authHeader() },
        body: JSON.stringify({ notes })
      });
      if ((await res.json()).ok) {
        this.textContent = '저장됨 ✓';
        setTimeout(() => this.textContent = '노트 저장', 1500);
        // 퀘스트 q3(노트 작성) 완료
        await fetch('/api/quest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeader() },
          body: JSON.stringify({ user_id: me.user_id, quest_id: 'q3' })
        }).catch(() => {});
      }
    };
    list.appendChild(div);
  });
}

// ─── 클러스터 렌더 ───────────────────────────────────

  data:        '데이터 수집 후 시각화까지 자동화한 사람들의 업무 시간이 평균 3.2시간/주 절약되었습니다.',
  customer:    '자동 응답의 응답 속도를 5분 이내로 줄였을 때 고객 만족도가 평균 31% 향상되었습니다.',

  research:    '정보 수집 자동화를 사용하는 리서처들은 요약 + 태그 분류 방식이 가장 효율적이라고 평가합니다.',
  marketing:   'A/B 테스트를 자동화한 마케터의 광고 효율이 평균 22% 향상되었습니다. 소재 변형을 빠르게 실험하는 것이 핵심입니다.',
  other:       '비슷한 문제를 가진 사람들과 솔루션을 공유할수록 프로젝트 완성률이 높아집니다.',
};
const TAG_LABELS = {
  content:'콘텐츠/크리에이터', ecommerce:'쇼핑/커머스', data:'데이터/분석',
  customer:'고객/서비스', productivity:'생산성/업무', research:'학습/리서치',
  marketing:'마케팅', other:'기타'
};

async function renderCluster(primary_tag) {
  const card = document.getElementById('cluster-card');
  try {
    const uid = me?.user_id ? `&user_id=${encodeURIComponent(me.user_id)}&cluster_rank=true` : '';
    const res = await fetch(`/api/project?cluster_tag=${encodeURIComponent(primary_tag)}${uid}`);
    const clusterData = await res.json();
    const count = clusterData.count || 1;
    const rank  = clusterData.rank;
    const label = TAG_LABELS[primary_tag] || '기타';
    const insight = TAG_INSIGHTS[primary_tag] || TAG_INSIGHTS.other;
    const rankBadge = rank ? `<span id="cluster-rank">${count}명 중 ${rank}위 ${rank === 1 ? '🏆' : rank <= 3 ? '🥈' : '✦'}</span>` : '';

    card.innerHTML = `
      <div id="cluster-top">
        <div id="cluster-label">${label} 클러스터</div>
        <div id="cluster-count">같은 클러스터 ${count}명 ${rankBadge}</div>
      </div>
      <div id="cluster-desc">비슷한 문제를 해결하고 있는 사람들과 같은 클러스터에 있어요.<br>집단 데이터 기반 인사이트를 확인해보세요.</div>
      <div id="cluster-insight">
        <div id="cluster-insight-title">💡 ${label} 클러스터 인사이트</div>
        <p>${insight}</p>
      </div>
      <button id="visit-cluster-btn" onclick="completeClusterQuest()">클러스터 탐험 완료 ✦</button>
      <button id="vote-cluster-btn" onclick="toggleClusterVote('${primary_tag}')" style="
        margin-left:.5rem;font-size:.38rem;letter-spacing:.15em;
        background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);
        border-radius:8px;color:rgba(251,191,36,.7);font-family:'Orbitron',sans-serif;
        padding:.4rem .9rem;cursor:pointer;transition:.2s;
      ">👍 나도 이 문제 있어요 · <span id="vote-count">-</span></button>
    `;
    loadClusterVote(primary_tag);
  } catch {}
}

async function loadClusterVote(tag) {
  try {
    const res = await fetch(`/api/vote?target_type=cluster&target_id=${tag}&user_id=${encodeURIComponent(me.user_id)}`);
    const d = await res.json();
    const btn = document.getElementById('vote-cluster-btn');
    document.getElementById('vote-count').textContent = d.count;
    if (d.voted) btn.style.background = 'rgba(251,191,36,.2)';
  } catch {}
}

async function toggleClusterVote(tag) {
  const res = await authFetch('/api/vote', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: me.user_id, target_type: 'cluster', target_id: tag })
  });
  if (!res) return;
  const d = await res.json();
  const btn = document.getElementById('vote-cluster-btn');
  if (d.action === 'added') {
    btn.style.background = 'rgba(251,191,36,.2)';
    document.getElementById('vote-count').textContent = parseInt(document.getElementById('vote-count').textContent || 0) + 1;
  } else {
    btn.style.background = 'rgba(251,191,36,.08)';
    document.getElementById('vote-count').textContent = Math.max(0, parseInt(document.getElementById('vote-count').textContent || 1) - 1);
  }
}

async function completeClusterQuest() {
  await completeManualQuest('q6', '클러스터 탐험', 0.15);
  document.getElementById('visit-cluster-btn').textContent = '탐험 완료 ✓';
  document.getElementById('visit-cluster-btn').disabled = true;
}

// ─── 새 프로젝트 모달 ─────────────────────────────────
function openNewModal() {
  document.getElementById('prob-input').value = '';
  document.getElementById('nova-says').className = 'hide';
  document.getElementById('cluster-result').className = '';
  document.getElementById('create-btn').disabled = false;
  document.getElementById('create-btn').textContent = '프로젝트 만들기 →';
  document.getElementById('new-modal').classList.add('open');
  setTimeout(() => document.getElementById('prob-input').focus(), 300);
}
function closeNewModal() {
  document.getElementById('new-modal').classList.remove('open');
}
document.getElementById('new-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('new-modal')) closeNewModal();
});

async function createProject() {
  const desc = document.getElementById('prob-input').value.trim();
  if (!desc) return;
  const btn = document.getElementById('create-btn');
  btn.disabled = true;
  btn.textContent = 'NOVA 분석 중...';

  const novaEl = document.getElementById('nova-says');
  novaEl.textContent = '분석 중...';
  novaEl.classList.add('show');

  try {
    const res = await authFetch('/api/project', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: me.user_id, description: desc })
    });
    if (!res) return;
    const data = await res.json();
    if (data.error) { novaEl.textContent = data.error; btn.disabled = false; btn.textContent = '다시 시도'; return; }

    novaEl.textContent = `"${data.project.title}" 프로젝트가 생성됐습니다! 🌱`;

    const clusterEl = document.getElementById('cluster-result');
    clusterEl.innerHTML = `<strong>${data.cluster.label}</strong> 클러스터 · 유사 프로젝트 ${data.cluster.count}개<br>같은 문제를 해결하고 있는 사람들이 있어요.`;
    clusterEl.classList.add('show');

    btn.textContent = '완료! 닫기';
    btn.disabled = false;
    btn.onclick = () => { closeNewModal(); loadProjects(); loadQuests(); showToast('프로젝트 생성 완료 ✦', '별이 +0.10 성장했습니다'); };
  } catch {
    novaEl.textContent = '오류가 발생했어요. 다시 시도해주세요.';
    btn.disabled = false; btn.textContent = '다시 시도';
  }
}

// ─── 월별 리포트 ─────────────────────────────────────
async function checkMonthlyReport() {
  if (!me?.user_id) return;
  const key = `nova_report_${new Date().toISOString().slice(0, 7)}`;
  if (localStorage.getItem(key)) return;

  try {
    const res = await fetch(`/api/user?id=${encodeURIComponent(me.user_id)}`);
    const u = await res.json();
    if (!u.last_month_count || u.last_month_count < 1) return;

    const month = new Date();
    month.setMonth(month.getMonth() - 1);
    const monthLabel = `${month.getMonth() + 1}월`;

    const msgs = [
      { icon: '💬', label: `${monthLabel} 채팅`, value: `${u.last_month_count}회` },
      { icon: '⭐', label: '현재 별 크기', value: `${(u.star_size || 1).toFixed(2)}` },
      { icon: '🔗', label: '초대한 친구', value: `${u.invite_count || 0}명` },
    ];

    document.getElementById('report-stats').innerHTML = msgs.map(m => `
      <div style="display:flex;justify-content:space-between;align-items:center;
        background:rgba(124,58,237,.1);border-radius:10px;padding:.6rem 1rem;font-size:.78rem;">
        <span style="color:rgba(196,181,253,.7);">${m.icon} ${m.label}</span>
        <span style="color:#fff;font-family:'Orbitron',sans-serif;font-size:.72rem;">${m.value}</span>
      </div>`).join('');

    const motivate = u.last_month_count >= 20 ? '지난달 정말 열심히 하셨어요! 이번 달도 함께해요 🚀'
      : u.last_month_count >= 5 ? '꾸준히 쌓인 활동이 별을 키우고 있어요 ✦'
      : '이번 달엔 더 자주 NOVA를 활용해보세요 💡';
    document.getElementById('report-msg').textContent = motivate;

    const modal = document.getElementById('monthly-modal');
    modal.style.display = 'flex';
  } catch {}
}

function closeMonthlyReport() {
  document.getElementById('monthly-modal').style.display = 'none';
  localStorage.setItem(`nova_report_${new Date().toISOString().slice(0, 7)}`, '1');
}

// ─── 초기화 ──────────────────────────────────────────
loadProjects();
loadQuests();
checkMonthlyReport();

// ─── 성과 기록 ────────────────────────────────────────
let statProjectId = null;

function openStatModal(projectId, projectTitle) {
  statProjectId = projectId;
  document.getElementById('stat-project-name').textContent = projectTitle;
  document.getElementById('stat-title').value = '';
  document.getElementById('stat-views').value = '';
  document.getElementById('stat-likes').value = '';
  document.getElementById('stat-shares').value = '';
  document.getElementById('stat-comments').value = '';
  document.getElementById('stat-modal').classList.add('open');
}

document.getElementById('stat-cancel').onclick = () =>
  document.getElementById('stat-modal').classList.remove('open');

document.getElementById('stat-submit').onclick = async function() {
  if (!statProjectId) return;
  this.disabled = true;
  this.textContent = '저장 중...';
  const res = await authFetch('/api/stats', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      user_id:    me.user_id,
      project_id: statProjectId,
      platform:   document.getElementById('stat-platform').value,
      title:      document.getElementById('stat-title').value,
      views:      document.getElementById('stat-views').value   || 0,
      likes:      document.getElementById('stat-likes').value   || 0,
      shares:     document.getElementById('stat-shares').value  || 0,
      comments:   document.getElementById('stat-comments').value|| 0,
    })
  });
  if (!res) return;
  if ((await res.json()).ok) {
    document.getElementById('stat-modal').classList.remove('open');
    loadStatMini(statProjectId);
  }
  this.disabled = false;
  this.textContent = '기록 저장';
};

async function loadStatMini(projectId) {
  const el = document.getElementById('stat-mini-' + projectId);
  if (!el) return;
  try {
    const res = await fetch('/api/stats?project_id=' + projectId);
    const data = await res.json();
    if (!data.length) return;
    const latest = data[0];
    const totalViews = data.reduce((s, r) => s + (r.views || 0), 0);
    const platEmoji = { threads:'🧵', instagram:'📸', youtube:'▶️', other:'📌' };
    el.innerHTML = `
      <span class="stat-chip">${platEmoji[latest.platform] || '📌'} ${latest.platform}</span>
      <span class="stat-chip">👁 ${totalViews.toLocaleString()}</span>
      <span class="stat-chip">기록 ${data.length}개</span>
    `;
  } catch {}
}
