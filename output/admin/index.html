<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000005;color:#e2e8f0;font-family:'Orbitron',sans-serif;min-height:100vh;padding:32px 16px 100px;}

/* 로그인 화면 */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80vh;gap:16px;}
#auth-screen h1{font-size:1.2rem;letter-spacing:.35em;color:#fff;text-shadow:0 0 30px #8b5cf6;}
#auth-screen input{background:rgba(255,255,255,.05);border:1px solid rgba(139,92,246,.3);
  border-radius:8px;padding:12px 16px;color:#e2e8f0;font-family:'Orbitron',sans-serif;
  font-size:.8rem;letter-spacing:.1em;width:240px;text-align:center;}
#auth-screen input:focus{outline:none;border-color:rgba(139,92,246,.7);}
#auth-screen button{padding:11px 28px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#7c3aed,#c084fc);color:#fff;
  font-family:'Orbitron',sans-serif;font-size:.75rem;letter-spacing:.2em;font-weight:700;cursor:pointer;}
#auth-screen button:hover{opacity:.85;}
.err{color:#f87171;font-size:.72rem;letter-spacing:.1em;}

/* 대시보드 */
#dashboard{display:none;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
.stat-box{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);
  border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-size:1.6rem;font-weight:900;color:#c4b5fd;}
.stat-label{font-size:.6rem;letter-spacing:.18em;color:rgba(167,139,250,.6);margin-top:4px;}

h2{font-size:.75rem;letter-spacing:.25em;color:rgba(167,139,250,.8);margin-bottom:12px;}

/* 테이블 */
.tbl-wrap{overflow-x:auto;margin-bottom:32px;}
table{width:100%;border-collapse:collapse;font-size:.68rem;}
thead th{text-align:left;padding:8px 10px;border-bottom:1px solid rgba(139,92,246,.2);
  letter-spacing:.12em;color:rgba(167,139,250,.7);white-space:nowrap;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
tbody tr:hover{background:rgba(139,92,246,.06);}
tbody td{padding:8px 10px;white-space:nowrap;}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.58rem;
  letter-spacing:.1em;font-weight:700;}
.badge.free{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);}
.badge.starter{background:rgba(99,102,241,.2);color:#818cf8;}
.badge.pro{background:rgba(139,92,246,.25);color:#c084fc;}

.star-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}

/* 로그 */
.log-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.65rem;}
.log-model{color:rgba(167,139,250,.8);}
.log-ok{color:#34d399;}
.log-fail{color:#f87171;}
.log-time{color:rgba(255,255,255,.3);}

/* 바텀 네비 */
nav.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;
  background:rgba(0,0,2,.95);border-top:1px solid rgba(139,92,246,.15);
  display:flex;align-items:center;justify-content:space-around;z-index:100;}
nav.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:rgba(167,139,250,.5);font-size:.42rem;letter-spacing:.12em;
  padding:8px 12px;transition:color .2s;}
nav.bottom-nav a:hover{color:#c4b5fd;}
nav.bottom-nav a svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;}
</style>
</head>
<body>

<!-- 인증 화면 -->
<div id="auth-screen">
  <h1>NOVA ADMIN</h1>
  <input type="password" id="pw-input" placeholder="마스터 비밀번호" autocomplete="off"/>
  <button onclick="login()">입장</button>
  <p id="auth-err" class="err"></p>
</div>

<!-- 대시보드 -->
<div id="dashboard">
  <!-- 통계 -->
  <div class="stats-row">
    <div class="stat-box"><div id="s-total" class="stat-val">-</div><div class="stat-label">전체 유저</div></div>
    <div class="stat-box"><div id="s-free" class="stat-val">-</div><div class="stat-label">무료</div></div>
    <div class="stat-box"><div id="s-starter" class="stat-val">-</div><div class="stat-label">스타터</div></div>
    <div class="stat-box"><div id="s-pro" class="stat-val">-</div><div class="stat-label">프로</div></div>
    <div class="stat-box"><div id="s-calls" class="stat-val">-</div><div class="stat-label">오늘 AI 호출 합산</div></div>
  </div>

  <!-- 유저 테이블 -->
  <h2>유저 목록</h2>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>닉네임</th>
          <th>이메일</th>
          <th>플랜</th>
          <th>오늘 호출</th>
          <th>초대</th>
          <th>별 색상</th>
          <th>가입일</th>
        </tr>
      </thead>
      <tbody id="user-tbody"></tbody>
    </table>
  </div>

  <!-- 최근 AI 로그 -->
  <h2>최근 AI 로그 (100건)</h2>
  <div id="log-list"></div>
</div>

<nav class="bottom-nav">
  <a href="/"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>UNIVERSE</a>
  <a href="/output/chat/"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>CHAT</a>
  <a href="/output/project/"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>PROJECT</a>
  <a href="/output/budget/"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg>BUDGET</a>
  <a href="/output/upgrade/"><svg viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg>UPGRADE</a>
</nav>

<script>
let adminKey = sessionStorage.getItem('nova_admin_key') || '';
if (adminKey) tryLoad(adminKey);

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function login() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  tryLoad(pw);
}

async function tryLoad(pw) {
  const res = await fetch('/api/admin', { headers: { 'x-admin-key': pw } });
  if (!res.ok) {
    document.getElementById('auth-err').textContent = '비밀번호가 틀렸습니다.';
    sessionStorage.removeItem('nova_admin_key');
    return;
  }
  sessionStorage.setItem('nova_admin_key', pw);
  const data = await res.json();
  render(data);
}

function render({ users, logs }) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  // 통계
  const free    = users.filter(u => !u.plan_type || u.plan_type === 'free').length;
  const starter = users.filter(u => u.plan_type === 'starter').length;
  const pro     = users.filter(u => u.plan_type === 'pro').length;
  const calls   = users.reduce((sum, u) => sum + (u.daily_count || 0), 0);

  document.getElementById('s-total').textContent   = users.length;
  document.getElementById('s-free').textContent    = free;
  document.getElementById('s-starter').textContent = starter;
  document.getElementById('s-pro').textContent     = pro;
  document.getElementById('s-calls').textContent   = calls;

  // 유저 테이블
  const tbody = document.getElementById('user-tbody');
  tbody.innerHTML = users.map((u, i) => {
    const plan = u.plan_type || 'free';
    const date = u.created_at ? u.created_at.slice(0, 10) : '-';
    const color = u.star_color || '#ffffff';
    return `<tr>
      <td>${i + 1}</td>
      <td>${esc(u.nickname || '-')}</td>
      <td>${esc(u.email || '-')}</td>
      <td><span class="badge ${plan}">${plan.toUpperCase()}</span></td>
      <td>${u.daily_count ?? 0}</td>
      <td>${u.invite_count ?? 0}</td>
      <td><span class="star-dot" style="background:${color}"></span>${color}</td>
      <td>${date}</td>
    </tr>`;
  }).join('');

  // AI 로그
  const logList = document.getElementById('log-list');
  logList.innerHTML = logs.map(l => {
    const t = l.created_at ? new Date(l.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : '';
    return `<div class="log-row">
      <span class="log-model">${esc(l.model || '-')}</span>
      <span class="${l.success ? 'log-ok' : 'log-fail'}">${l.success ? '✓' : '✗'}</span>
      <span class="log-time">${t}</span>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
