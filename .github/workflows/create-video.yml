name: Create Video

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 08:00 KST (23:00 UTC)
  repository_dispatch:
    types: [create-video]
  workflow_dispatch:
    inputs:
      text:
        description: '스크립트 텍스트 (비우면 AI 자동 생성)'
        required: false
        default: ''
      title:
        description: '영상 제목'
        required: false
        default: ''
      tags:
        description: '태그'
        required: false
        default: ''
      tool_name:
        description: '툴 이름'
        required: false
        default: ''
      ig_slides:
        description: 'IG 슬라이드 내용'
        required: false
        default: ''
      dry_run:
        description: '발행 스킵 (테스트용)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 의존성 설치
        run: npm install

      - name: FFmpeg + 한국어 폰트 + edge-tts + Chromium 설치
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg fonts-nanum fonts-nanum-extra python3-pip \
            chromium-browser \
            libgbm-dev libnss3 libatk-bridge2.0-0 libxkbcommon0 libgtk-3-0
          pip3 install edge-tts --quiet
          fc-cache -fv
          echo "✅ chromium: $(chromium-browser --version 2>/dev/null || echo 없음)"
          edge-tts --list-voices | grep ko-KR || echo "⚠️ 한국어 음성 없음"
          fc-list | grep -i nanum || echo "⚠️ Nanum 폰트 없음"

      - name: 영상 생성 및 발행
        env:
          SCRIPT_TEXT: ${{ github.event.client_payload.text || github.event.inputs.text }}
          SCRIPT_TITLE: ${{ github.event.client_payload.title || github.event.inputs.title }}
          SCRIPT_TAGS: ${{ github.event.client_payload.tags || github.event.inputs.tags }}
          SCRIPT_TOOL_NAME: ${{ github.event.client_payload.tool_name || github.event.inputs.tool_name || '' }}
          SCRIPT_COMPARE: ${{ github.event.client_payload.compare_with || '' }}
          SCRIPT_COMBO: ${{ github.event.client_payload.combo_tip || '' }}
          SCRIPT_TOOL_URL: ${{ github.event.client_payload.tool_url || '' }}
          SCRIPT_IG_SLIDES: ${{ github.event.client_payload.ig_slides || github.event.inputs.ig_slides || '' }}
          GOOGLE_TTS_KEY: ${{ secrets.GOOGLE_TTS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/generate_video.js

      - name: 실패 시 debug-agent 트리거
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/dkskwnslej0217-wq/debug-agent/dispatches \
            -d "{\"event_type\":\"pipeline-failure\",\"client_payload\":{\"repo\":\"nova-pipeline\",\"run_id\":\"${{ github.run_id }}\",\"workflow\":\"Create Video\"}}"
