name: Create Video

on:
  repository_dispatch:
    types: [create-video]
  workflow_dispatch:
    inputs:
      text:
        description: '스크립트 텍스트'
        required: false
        default: 'AI 자동화 테스트 영상입니다.'
      title:
        description: '영상 제목'
        required: false
        default: 'NOVA AI 테스트'
      tags:
        description: '태그'
        required: false
        default: 'AI,자동화,테스트'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 의존성 설치
        run: npm install

      - name: FFmpeg + 한국어 폰트 설치
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libass-dev fonts-nanum fonts-nanum-extra
          fc-cache -fv
          ffmpeg -version | head -3
          ffmpeg -filters 2>/dev/null | grep subtitles || echo "⚠️ subtitles 필터 없음"

      - name: 영상 생성 및 YouTube 업로드
        env:
          SCRIPT_TEXT: ${{ github.event.client_payload.text || github.event.inputs.text }}
          SCRIPT_TITLE: ${{ github.event.client_payload.title || github.event.inputs.title }}
          SCRIPT_TAGS: ${{ github.event.client_payload.tags || github.event.inputs.tags }}
          GOOGLE_TTS_KEY: ${{ secrets.GOOGLE_TTS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/generate_video.js
